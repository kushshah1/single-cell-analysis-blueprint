version: '3.8'

services:
  backend:
    image: nvcr.io/nvidia/rapidsai/notebooks:26.04-cuda13-py3.12
    pull_policy: always
    ulimits:
      memlock: -1
      stack: 67108864
    shm_size: 1g
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      EXTRA_PIP_PACKAGES: "rapids-singlecell-cu13==0.15.2"
    ports:
      - "0.0.0.0:8888:8888"
      - "0.0.0.0:8787:8787"
      - "0.0.0.0:8786:8786"
    volumes:
      - /home/ubuntu/single-cell-analysis-blueprint:/notebooks/
    user: root
    working_dir: /notebooks
    entrypoint: ["/home/rapids/entrypoint.sh"]
    command:
      - /bin/bash
      - -lc
      - |
          cd /notebooks
          git fetch origin workshop_branch
          git checkout -B workshop_branch origin/workshop_branch
          exec bash /notebooks/setup_launchable.sh
    restart: unless-stopped
