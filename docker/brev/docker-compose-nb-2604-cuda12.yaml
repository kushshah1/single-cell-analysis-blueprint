version: '3.8'

services:
  backend:
    image: nvcr.io/nvidia/rapidsai/notebooks:26.04-cuda12-py3.12
    pull_policy: always
    ulimits:
      memlock: -1
      stack: 67108864
    shm_size: 1g
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
        # Precompiled rapids-singlecell wheel matching the container's CUDA 12 runtime.
        EXTRA_PIP_PACKAGES: "rapids-singlecell-cu12==0.15.2"
    ports:
      - "0.0.0.0:8888:8888"      # JupyterLab
      - "0.0.0.0:8787:8787"      # Dask dashboard
      - "0.0.0.0:8786:8786"      # Dask scheduler
    volumes:
      - /home/ubuntu/single-cell-analysis-blueprint:/notebooks/
    user: root
    working_dir: /notebooks
    entrypoint: ["/home/rapids/entrypoint.sh"]
    command: bash /notebooks/setup_launchable.sh
    restart: unless-stopped
